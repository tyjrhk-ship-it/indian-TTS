</head>
<body>

  <div class="container">
    <h1>🇮🇳 Indian TTS</h1>

    <p>India's AI Text to Speech Platform</p>

    <textarea id="text" placeholder="Type your text here..."></textarea>

    <select>

    <button id="generate">
      Generate Voice
    </button>

  </div>

<script src="script.js"></script>

</body>
